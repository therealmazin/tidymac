name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: darwin-arm64
          - target: x86_64-apple-darwin
            name: darwin-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf tidymac-${{ github.ref_name }}-${{ matrix.name }}.tar.gz tidymac
          mv tidymac-${{ github.ref_name }}-${{ matrix.name }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidymac-${{ matrix.name }}
          path: tidymac-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tidymac-*.tar.gz
          generate_release_notes: true

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract and prepare npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract ARM64 binary
          mkdir -p npm/tidymac-darwin-arm64/bin
          tar -xzf tidymac-${GITHUB_REF_NAME}-darwin-arm64.tar.gz -C npm/tidymac-darwin-arm64/bin
          chmod +x npm/tidymac-darwin-arm64/bin/tidymac

          # Extract x64 binary
          mkdir -p npm/tidymac-darwin-x64/bin
          tar -xzf tidymac-${GITHUB_REF_NAME}-darwin-x64.tar.gz -C npm/tidymac-darwin-x64/bin
          chmod +x npm/tidymac-darwin-x64/bin/tidymac

          # Update versions in all package.json files
          for pkg in npm/tidymac npm/tidymac-darwin-arm64 npm/tidymac-darwin-x64; do
            cd $pkg
            npm version $VERSION --no-git-tag-version --allow-same-version
            cd -
          done

          # Update optionalDependencies versions in main package
          cd npm/tidymac
          node -e "
            const pkg = require('./package.json');
            const v = '$VERSION';
            pkg.optionalDependencies['@tidymac/darwin-arm64'] = v;
            pkg.optionalDependencies['@tidymac/darwin-x64'] = v;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd -

      - name: Publish @tidymac/darwin-arm64
        run: cd npm/tidymac-darwin-arm64 && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tidymac/darwin-x64
        run: cd npm/tidymac-darwin-x64 && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish tidymac
        run: cd npm/tidymac && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
